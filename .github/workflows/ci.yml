name: CI

# Прогон тестовой пирамиды на push/PR в main.
# e2e пропускается по умолчанию (conftest: skip без --run-e2e) — в CI не гоняем.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # 3.9 — нижняя граница requires-python; 3.12 — текущая.
        python-version: ["3.9", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - name: Установить проект с dev-зависимостями
        run: pip install -e ".[dev]"
      - name: Прогнать тесты (e2e пропускается без --run-e2e)
        run: pytest

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Установить проект с dev-зависимостями
        run: pip install -e ".[dev]"
      - name: Проверить форматирование (black)
        run: black --check yac tests
      - name: Проверить линтером (ruff)
        run: ruff check yac tests
